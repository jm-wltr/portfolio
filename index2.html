<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Waves</title>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ascii {
            font-family: monospace;
            line-height: 1.15;
            white-space: pre;
            font-size: 12px;
            /* Center the block if it's smaller than screen */
            display: inline-block;
        }
    </style>
</head>

<body>

    <pre id="ascii"></pre>

    <script>
        /**
        /**
 * Custom Canvas ASCII Renderer
 * A lightweight, high-performance renderer for ASCII effects.
 * Written specifically for this portfolio project.
 */
        class AsciiScreen {
            constructor(container, config = {}) {
                this.container = container;
                this.config = config;
                this.palette = config.palette || ['#ffffff'];
                this.mode = config.mode || 'mono';

                // Create Canvas for rendering
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });

                // Style and clean up container
                this.container.style.display = 'none'; // Hide the original <pre>
                this.container.parentNode.insertBefore(this.canvas, this.container);

                // Font Settings (matches your CSS)
                this.fontSize = 12;
                this.fontFamily = 'monospace';

                // State
                this.cols = 0;
                this.rows = 0;
                this.data = [];
                this.colors = [];

                // Initialize
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                // Measure font specifically
                this.ctx.font = `${this.fontSize}px ${this.fontFamily}`;
                const m = this.ctx.measureText('W'); // Monospace width
                const charW = Math.ceil(m.width);
                const charH = Math.ceil(this.fontSize * 1.15); // Line height

                this.charW = charW;
                this.charH = charH;

                // Calculate Grid Constraints
                const w = window.innerWidth;
                const h = window.innerHeight;

                let c = Math.floor(w / charW);
                let r = Math.floor(h / charH);

                // Apply Config Limits
                if (this.config.maxCols) c = Math.min(c, this.config.maxCols);
                if (this.config.minCols) c = Math.max(c, this.config.minCols);

                this.cols = c;
                this.rows = r;

                // Resize Canvas (High DPI support)
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = c * charW * dpr;
                this.canvas.height = r * charH * dpr;
                this.canvas.style.width = `${c * charW}px`;
                this.canvas.style.height = `${r * charH}px`;

                // Context Scaling & Font
                this.ctx.scale(dpr, dpr);
                this.ctx.font = `${this.fontSize}px ${this.fontFamily}`;
                this.ctx.textBaseline = 'top';
                this.ctx.textAlign = 'center';

                // Reset Buffers
                const size = c * r;
                this.data = new Array(size).fill(' ');
                this.colors = new Uint8Array(size).fill(0);
            }

            clear() {
                this.data.fill(' ');
                this.colors.fill(0);
            }

            put(x, y, char, colorIdx = 0) {
                if (x < 0 || x >= this.cols || y < 0 || y >= this.rows) return;
                const i = y * this.cols + x;
                this.data[i] = char;
                this.colors[i] = colorIdx;
            }

            renderToElement() {
                const ctx = this.ctx;
                const cw = this.charW;
                const ch = this.charH;
                const w = this.cols * cw;
                const h = this.rows * ch;

                // 1. Clear Screen
                ctx.fillStyle = this.config.bgColor || '#0d1117';
                ctx.fillRect(0, 0, w, h);

                // 2. Render Loop
                // Optimization: We could batch by color, but for plasma (gradient), linear is fine

                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        const i = y * this.cols + x;
                        const char = this.data[i];
                        if (!char || char === ' ') continue;

                        const colIdx = this.colors[i];
                        ctx.fillStyle = this.palette[colIdx % this.palette.length];

                        // Draw center-aligned
                        ctx.fillText(char, x * cw + (cw / 2), y * ch);
                    }
                }
            }
        }
        // --- USER CODE BELOW ---

        const el = document.getElementById("ascii");

        const screen = new AsciiScreen(el, {
            renderer: "dom",
            mode: "palette",
            // Ocean / Cyber Blue Gradient:
            // [Deep Navy, Vibrant Blue, Soft Blue, bright Cyan]
            palette: ["#164e82", "#1f6feb", "#58a6ff", "#b6e3ff"],
            bgColor: "#0d1117", // Match CSS background
            defaultRows: 40,
            minCols: 60,
            maxCols: 200,
        });

        // Dense character set for smooth gradients
        const CHARS = " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";

        function drawPlasma(t) {
            const cols = screen.cols;
            const rows = screen.rows;

            screen.clear();

            // 1. STRONGER DEFORMATIONS:
            // Increased scaling factors (zoom in slightly)
            const xScale = 0.08;
            const yScale = 0.15;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {

                    const u = x * xScale;
                    const v = y * yScale;

                    // Higher frequency multipliers for more "ripples"
                    let val = Math.sin(u + t * 1.2);
                    val += Math.sin((v + u) * 0.8 + t);

                    const cx = u + 6 * Math.sin(t * 0.4);
                    const cy = v + 6 * Math.cos(t * 0.3);
                    val += Math.sin(Math.sqrt(cx * cx + cy * cy) * 1.5 + t);

                    val += Math.sin(Math.sqrt(u * u + v * v) * 2.0 + t);

                    // Map to 0..1
                    let density = (val + 4) / 8;

                    // 2. SHARPER CONTRAST
                    // Power curve makes low/high values more extreme
                    density = Math.pow(density, 1.5);

                    const d = Math.max(0, Math.min(1, density));

                    // Character Selection
                    const charIdx = Math.floor(d * (CHARS.length - 1));
                    const char = CHARS[charIdx];

                    // Color Banding: Faster cycling for more "active" feel
                    const colorVal = density * 10 + t * 0.8;
                    const palIdx = Math.floor(colorVal) % 4;

                    screen.put(x, y, char, palIdx);
                }
            }

            screen.renderToElement();
        }

        let start = performance.now();
        function loop(now) {
            const t = (now - start) / 1000;
            drawPlasma(t * 0.6);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>

</body>

</html>
