<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: monospace;
            background: white;
            color: black;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0f0f0f;
                color: #e5e5e5;
            }
        }

        .info {
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        @media (prefers-color-scheme: dark) {
            .info {
                background: #1a1a1a;
            }
        }
    </style>
</head>

<body>
    <h1>Dark Mode Detection Test</h1>
    <div class="info">
        <p>If you're in dark mode, this page should have a dark background.</p>
        <p>If you're in light mode, this page should have a white background.</p>
        <br>
        <p><strong>Current detection:</strong></p>
        <p id="result"></p>
    </div>

    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const result = document.getElementById('result');
        result.textContent = isDark ? '✅ DARK MODE DETECTED' : '☀️ LIGHT MODE DETECTED';
        result.style.fontSize = '24px';
        result.style.fontWeight = 'bold';
        result.style.color = isDark ? '#00ff00' : '#0066ff';
    </script>
</body>

</html>
